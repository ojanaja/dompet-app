services:
  postgres:
    image: postgres:15-alpine
    container_name: dompet_postgres
    restart: always
    environment:
      POSTGRES_USER: dompet_user
      POSTGRES_PASSWORD: dompet_password
      POSTGRES_DB: dompet_db
    ports:
      - "5433:5432"
    volumes:
      - dompet_pgdata:/var/lib/postgresql/data

volumes:
  dompet_pgdata:
